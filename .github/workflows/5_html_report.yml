name: 5 - HTML Report

on: [push]

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests with HTML report
        run: pytest labs/tests.py --html=report.html --self-contained-html
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: report.html
